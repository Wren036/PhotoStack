<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 300" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr3" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L8 4 L0 8 z" fill="#9a908a"/>
    </marker>
  </defs>
  <rect width="560" height="300" fill="#faf7f3"/>
  <text x="280" y="28" text-anchor="middle" font-size="15" font-weight="600" fill="#4a4440">展开动画 — 同时出发，递增时长</text>

  <!-- 坐标轴 -->
  <line x1="80" y1="250" x2="520" y2="250" stroke="#c8beb6" stroke-width="1.5" marker-end="url(#arr3)"/>
  <line x1="80" y1="250" x2="80" y2="55" stroke="#c8beb6" stroke-width="1.5" marker-end="url(#arr3)"/>
  <text x="524" y="282" font-size="11" fill="#9a908a" text-anchor="end">时间 (ms)</text>
  <text x="66" y="52" font-size="11" fill="#9a908a">飞行进度</text>

  <!-- 刻度 -->
  <line x1="270" y1="250" x2="270" y2="254" stroke="#9a908a"/>
  <text x="270" y="266" font-size="10.5" fill="#9a908a" text-anchor="middle">450</text>
  <line x1="460" y1="250" x2="460" y2="254" stroke="#9a908a"/>
  <text x="460" y="266" font-size="10.5" fill="#9a908a" text-anchor="middle">900</text>

  <!-- 到位线 -->
  <line x1="80" y1="80" x2="520" y2="80" stroke="#e0d6cd" stroke-width="1" stroke-dasharray="5 4"/>
  <text x="86" y="74" font-size="10.5" fill="#b0a69e">落位（各自的消息行）</text>

  <!-- 六条easeOut曲线：同起点，时长 450+i*90 -->
  <path d="M 80 250 Q 140 105 270 80" fill="none" stroke="#f5b8c0" stroke-width="2.5"/>
  <path d="M 80 250 Q 155 110 308 80" fill="none" stroke="#a8d8c8" stroke-width="2.5"/>
  <path d="M 80 250 Q 170 115 346 80" fill="none" stroke="#a5d3ea" stroke-width="2.5"/>
  <path d="M 80 250 Q 185 120 384 80" fill="none" stroke="#f2dd88" stroke-width="2.5"/>
  <path d="M 80 250 Q 200 125 422 80" fill="none" stroke="#f0b070" stroke-width="2.5"/>
  <path d="M 80 250 Q 215 130 460 80" fill="none" stroke="#c5a8dd" stroke-width="2.5"/>

  <!-- 终点圆点 -->
  <circle cx="270" cy="80" r="4" fill="#f5b8c0"/>
  <circle cx="308" cy="80" r="4" fill="#a8d8c8"/>
  <circle cx="346" cy="80" r="4" fill="#a5d3ea"/>
  <circle cx="384" cy="80" r="4" fill="#f2dd88"/>
  <circle cx="422" cy="80" r="4" fill="#f0b070"/>
  <circle cx="460" cy="80" r="4" fill="#c5a8dd"/>

  <!-- 起点 -->
  <circle cx="80" cy="250" r="5" fill="#8a7a70"/>
  <text x="94" y="246" font-size="11" fill="#8a6a58">所有卡片同一瞬间从堆内出发</text>

  <!-- 标注 -->
  <text x="222" y="120" font-size="11" fill="#c06a7a" transform="rotate(-16 222 120)">第 1 张 450ms 先到</text>
  <text x="400" y="153" font-size="11" fill="#8a6ab0" transform="rotate(-18 400 153)">第 6 张 900ms 殿后</text>

  <text x="280" y="290" text-anchor="middle" font-size="11.5" fill="#9a908a">任意时刻每张卡片均在运动（无静止帧）；后卡受前卡遮挡，视觉上依次显出</text>
</svg>
