<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 300" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr2" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L8 4 L0 8 z" fill="#9a908a"/>
    </marker>
  </defs>
  <rect width="560" height="300" fill="#faf7f3"/>
  <text x="280" y="28" text-anchor="middle" font-size="15" font-weight="600" fill="#4a4440">峰形轨迹 — 擦洗进度模型</text>

  <!-- 坐标轴 -->
  <line x1="70" y1="240" x2="510" y2="240" stroke="#c8beb6" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="70" y1="240" x2="70" y2="60" stroke="#c8beb6" stroke-width="1.5" marker-end="url(#arr2)"/>
  <text x="380" y="272" font-size="11" fill="#9a908a" text-anchor="middle">手指进度 p（起点 → 屏幕边）</text>
  <text x="60" y="56" font-size="11.5" fill="#9a908a">顶卡位移</text>

  <!-- 关键刻度 -->
  <line x1="290" y1="240" x2="290" y2="244" stroke="#9a908a"/>
  <text x="290" y="257" font-size="11" fill="#9a908a" text-anchor="middle">p = 0.5</text>
  <line x1="490" y1="240" x2="490" y2="244" stroke="#9a908a"/>
  <text x="490" y="257" font-size="11" fill="#9a908a" text-anchor="middle">p = 1</text>

  <!-- 最远虚线 -->
  <line x1="70" y1="85" x2="510" y2="85" stroke="#e0d6cd" stroke-width="1" stroke-dasharray="5 4"/>
  <text x="76" y="99" font-size="11" fill="#b0a69e">峰值位移 ≈ 卡宽 × 0.52</text>

  <!-- 探边位虚线 -->
  <line x1="70" y1="205" x2="510" y2="205" stroke="#e0d6cd" stroke-width="1" stroke-dasharray="5 4"/>
  <text x="120" y="199" font-size="11" fill="#b0a69e">对侧探边位</text>

  <!-- 山峰曲线：0→0.5 线性到最远，0.5→1 拐回探边位 -->
  <path d="M 70 240 L 290 85 L 490 205" fill="none" stroke="#e08a9a" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 峰点 -->
  <circle cx="290" cy="85" r="5" fill="#e08a9a"/>
  <text x="290" y="68" font-size="11.5" fill="#c06a7a" text-anchor="middle" font-weight="600">越过峰值层级即下沉（zIndex 110 → 102）</text>

  <!-- 阶段标注 -->
  <text x="175" y="180" font-size="12" fill="#c06a7a" transform="rotate(-35 175 180)">前半程：跟随手指滑出</text>
  <text x="365" y="118" font-size="12" fill="#c06a7a" transform="rotate(29 365 118)">后半程：自行回归 + 缩小</text>

  <!-- 终点 -->
  <circle cx="490" cy="205" r="5" fill="#e08a9a"/>
  <text x="466" y="228" font-size="11" fill="#c06a7a" text-anchor="middle">落入探边位</text>

  <text x="280" y="292" text-anchor="middle" font-size="11.5" fill="#9a908a">越过峰值后顶卡沿轨迹自行回归，不跟随手指反向 — 全程可逆，零死区</text>
</svg>
